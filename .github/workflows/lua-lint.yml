name: Lua Lint

on:
  push:
    paths:
      - "**/*.lua"
      - ".luacheckrc"
      - ".github/workflows/lua-lint.yml"
  pull_request:
    paths:
      - "**/*.lua"
      - ".luacheckrc"
      - ".github/workflows/lua-lint.yml"

jobs:
  luacheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "5.1"

      - name: Setup LuaRocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Install luacheck
        run: luarocks install luacheck

      - name: Run luacheck
        run: luacheck .